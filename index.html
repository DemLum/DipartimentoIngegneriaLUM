<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Modern Professional Website with Botpress Integration">
    <link rel="stylesheet" href="styles.css">
    <title>Professional Website</title>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/service-worker.js').then(function(reg) {
                    console.log('Service Worker registered');
                }).catch(function(error) {
                    console.error('Service Worker registration failed:', error);
                });
            });
        }
    </script>
</head>
<body>
    <header class="hero">
        <h1>Welcome to Our Professional Service</h1>
        <p>Your satisfaction is our priority.</p>
        <button id="chat-button">Chat with us!</button>
    </header>
    <section class="services">
        <div class="service-card">
            <h2>Service 1</h2>
            <p>Description of Service 1.</p>
        </div>
        <div class="service-card">
            <h2>Service 2</h2>
            <p>Description of Service 2.</p>
        </div>
        <div class="service-card">
            <h2>Service 3</h2>
            <p>Description of Service 3.</p>
        </div>
    </section>
    <div id="info-boxes">
        <div class="info-box">
            <h3>Info Box 1</h3>
            <p>Details about Info Box 1.</p>
        </div>
        <div class="info-box">
            <h3>Info Box 2</h3>
            <p>Details about Info Box 2.</p>
        </div>
    </div>
    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2024/11/07/09/20241107093152-C7HG1MHH.js" defer></script>
</body>
</html>
