<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: #fff;
        }
        header {
            background: #333;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            margin: 15px;
            padding: 20px;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        footer {
            text-align: center;
            padding: 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Our Modern Website</h1>
    </header>
    <div class="card">
        <h2>Feature 1</h2>
        <p>Description of feature 1...</p>
    </div>
    <div class="card">
        <h2>Feature 2</h2>
        <p>Description of feature 2...</p>
    </div>
    <footer>
        <p>&copy; 2026 Modern Website. All rights reserved.</p>
    </footer>
    <script>
        // Botpress chatbot configuration
        window.botpressChatbox && window.botpressChatbox.init();
    </script>
</body>
</html>
